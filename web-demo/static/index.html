<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Profile Generator Demo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="window" id="window">
    <section class="composer-pane" id="composerPane" aria-label="Profile idea input">
      <div class="composer-shell">
        <textarea id="sentence" maxlength="1000" rows="5" spellcheck="true" placeholder="Type a sentence like “a database migration reviewer”. I will expand it into a mature agent prompt, generate an installable Hermes profile repo, validate it, build a playable demo, draw a contents diagram, and package the download."></textarea>
        <div class="composer-footer">
          <span id="composerHint">Press Command Enter to generate</span>
          <button id="generate" aria-label="Generate profile">Generate</button>
        </div>
      </div>
    </section>

    <section class="workbench" id="workbench" hidden>
      <aside class="rail" aria-label="Generation status">
        <div class="brand-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusLabel">Waiting</span>
        </div>
        <ol class="stage-list" id="stageList"></ol>
      </aside>

      <section class="detail-pane" aria-live="polite">
        <header class="detail-header">
          <div>
            <p class="overline">Prompt to profile</p>
            <h1 id="headline">Building your Hermes profile</h1>
          </div>
          <button id="newRun" class="ghost">New sentence</button>
        </header>

        <div class="sentence-card panel">
          <span>Input</span>
          <p id="inputEcho"></p>
        </div>

        <div class="panel-grid" id="panelGrid"></div>

        <section class="results" id="results" hidden>
          <div class="result-card panel">
            <div>
              <span>Generated profile</span>
              <h2 id="profileTitle">Generated profile</h2>
              <p id="profilePath"></p>
            </div>
            <code id="installCommand"></code>
          </div>
          <div class="artifact-grid">
            <a id="downloadZip" class="artifact" href="#">Download repo zip</a>
            <a id="playDemo" class="artifact" href="#" target="_blank">Play demo</a>
            <a id="viewDiagram" class="artifact" href="#" target="_blank">View diagram</a>
            <a id="viewPrompt" class="artifact" href="#" target="_blank">View mature prompt</a>
            <a id="viewValidation" class="artifact" href="#" target="_blank">Validation report</a>
          </div>
          <iframe id="diagramFrame" title="Profile contents diagram"></iframe>
        </section>

        <pre id="error" hidden></pre>
      </section>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
